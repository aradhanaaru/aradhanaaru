name: generate animation

on:
  schedule:
    - cron: "0 0 * * *"     # runs once a day
  workflow_dispatch:         # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main                # regenerate on every push to main (change if your default branch is "master")

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate github-contribution-grid-snake.svg (pink/purple palette)
        uses: Platane/snk@v3
        with:
          github_user_name: aradhanaaru
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=FF2FD0,B026FF&color_dots=1a0033,4c0a75,8b1fc9,c13bff,ff2fd0
            dist/github-contribution-grid-snake-dark.svg?color_snake=FF2FD0,B026FF&color_dots=1a0033,4c0a75,8b1fc9,c13bff,ff2fd0

      - name: push generated files to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
